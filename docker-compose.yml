services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-agent-app
    ports:
      - "8000:8000"
    environment:
      TASK_QUEUE_BACKEND: in_process
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MYSQL_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-password}@mysql:3306/${MYSQL_DATABASE:-airag_agent}?charset=utf8mb4
      VECTOR_BACKEND: milvus
      MILVUS_URI: http://milvus:19530
      RERANK_PROVIDER: ${RERANK_PROVIDER:-dashscope}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-autodl}
      AUTODL_API_KEY: ${AUTODL_API_KEY:-}
      AUTODL_MODEL: ${AUTODL_MODEL:-gpt-5.5}
      AUTODL_BASE_URL: ${AUTODL_BASE_URL:-https://www.autodl.art/api/v1}
      AUTODL_TIKTOKEN_MODEL: ${AUTODL_TIKTOKEN_MODEL:-gpt-4o}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      ADMIN_TENANT_ID: ${ADMIN_TENANT_ID:-default}
      ACCESS_CONTROL_CONFIG_PATH: config/access_control.yml
    volumes:
      - ./data:/app/AIRAGAgent/data
      - ./logs:/app/AIRAGAgent/logs
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: enterprise-agent-mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-airag_agent}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: enterprise-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: enterprise-agent-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: enterprise-agent-minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: enterprise-agent-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
